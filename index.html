<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top High School Football Programs of All-Time (50+ seasons)</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>

    
<!-- Top Banner Image -->
<div class="header-banner">
    <img src="wwwroot/images/football-field-top.jpg" 
         alt="Football Field Header" 
         class="w-100" />
</div>


    <!-- Team Header -->
    <div class="team-header" id="teamHeader">
        <!-- Will be populated by JavaScript -->
    </div>

    <!-- Main Content -->
    <div class="container mt-4">
        <h1>Top High School Football Programs of All-Time (50+ seasons)</h1>
        
        <div class="form-group mb-4">
            <input type="text" class="form-control" id="searchInput" placeholder="Search programs..." />
        </div>

        <!-- Table Content -->
        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Program</th>
                        <th>Combined</th>
                        <th>Margin</th>
                        <th>Win-Loss</th>
                        <th>Offense</th>
                        <th>Defense</th>
                        <th>State</th>
                        <th>Seasons</th>
                        <th>Details</th>
                    </tr>
                </thead>
                <tbody id="programsTableBody">
                    <!-- Data will be populated by JavaScript -->
                </tbody>
            </table>
        </div>

        <!-- Comments Section -->
        <div class="comments-section mt-5">
            <h3>Comments</h3>
            <div id="comments">
                <!-- Vercel Comments Component will be added here -->
            </div>
        </div>

<!-- Bottom Banner Image -->
<div class="footer-banner mt-4">
    <div class="text-center mb-3">
        <p>© 2024 McKnight's Football Rankings</p>
    </div>
    
    <img src="wwwroot/images/football-field-top.jpg" 
         alt="Football Field Footer" 
         class="w-100" />
</div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom JavaScript -->
    <script src="js/main.js"></script>
</body>
</html>
