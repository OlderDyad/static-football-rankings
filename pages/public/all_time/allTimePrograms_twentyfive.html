<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top High School Football Programs (25+ seasons)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static-football-rankings/css/styles.css" rel="stylesheet">
</head>
<body>
    <div class="header-banner">
        <img src="/static-football-rankings/docs/images/football-field-top.jpg" 
             alt="Football Field Header" 
             class="w-100" />
    </div>

    <div class="container mt-3">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item">
                    <a href="/static-football-rankings/index.html">Home</a>
                </li>
                <li class="breadcrumb-item active" aria-current="page">25+ Seasons Programs</li>
            </ol>
        </nav>
    </div>

    <!-- Notice the data-page-name attribute -->
    <h1 data-page-name="50+ seasons">Top High School Football Programs (25+ seasons)</h1>

    <div class="team-header"></div>

    <div class="container mt-4">
        <div class="form-group mb-4">
            <input type="text" class="form-control" id="searchInput" placeholder="Search programs..." />
        </div>

        <div class="d-flex justify-content-end mb-3">
            <small class="text-muted">Updated: <span id="lastUpdated"></span></small>
        </div>

        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Program</th>
                        <th>Combined</th>
                        <th>Margin</th>
                        <th>Win-Loss</th>
                        <th>Offense</th>
                        <th>Defense</th>
                        <th>State</th>
                        <th>Seasons</th>
                        <th>Details</th>
                    </tr>
                </thead>
                <tbody id="programsTableBody"></tbody>
            </table>
        </div>

        <nav aria-label="Page navigation">
            <ul class="pagination justify-content-center" id="pagination"></ul>
        </nav>

        <!-- Comments Section -->
        <div class="comments-section mt-5">
            <h3>Comments</h3>
            <div id="commentsList"></div>
            <div id="commentForm" class="mt-4">
                <textarea id="commentText" class="form-control mb-2" rows="3" placeholder="Share your thoughts..."></textarea>
                <button id="submitComment" class="btn btn-primary">Post Comment</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Notice the correct module path -->
    <script type="module" src="/static-football-rankings/docs/js/main.js"></script>
</body>
</html>
