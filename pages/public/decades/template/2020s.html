<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2020s High School Football Teams</title>
    <meta name="data-file" content="/static-football-rankings/data/decade-teams-2020s.json">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static-football-rankings/css/styles.css" rel="stylesheet">
</head>
<body>
    <div class="header-banner">
        <img src="/static-football-rankings/docs/images/football-field-top.jpg" alt="Football Field Header" class="w-100" />
    </div>

    <div class="container mt-3">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="/static-football-rankings/index.html">Home</a></li>
                <li class="breadcrumb-item"><a href="/static-football-rankings/pages/public/decades/index.html">Rankings by Decade</a></li>
                <li class="breadcrumb-item active">2020s Teams</li>
            </ol>
        </nav>
    </div>

    <div class="loading-state"></div>
    <div class="team-header"></div>

    <div class="container mt-4">
        <h1 data-page-name="2020s">Top High School Football Teams of the 2020s</h1>
        
        <div class="form-group mb-4">
            <input type="text" class="form-control" id="searchInput" placeholder="Search teams..." />
        </div>

        <div class="d-flex justify-content-end mb-3">
            <small class="text-muted">Updated: <span id="lastUpdated"></span></small>
        </div>

        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Team</th>
                        <th>Season</th>
                        <th>Combined</th>
                        <th>Margin</th>
                        <th>Win-Loss</th>
                        <th>Offense</th>
                        <th>Defense</th>
                        <th>Games</th>
                        <th>State</th>
                        <th>Details</th>
                    </tr>
                </thead>
                <tbody id="programsTableBody">
                </tbody>
            </table>
        </div>

        <nav aria-label="Page navigation" class="mt-4">
            <ul class="pagination justify-content-center" id="pagination"></ul>
        </nav>

        <div class="comments-section mt-5">
            <h3>Comments</h3>
            <div id="authContainer" class="mb-3"></div>
            <div id="commentForm" class="mb-4" style="display: none">
                <div class="card">
                    <div class="card-body">
                        <textarea id="commentText" class="form-control mb-2" rows="3" placeholder="Share your thoughts..."></textarea>
                        <div class="d-flex justify-content-between align-items-center">
                            <button id="submitComment" class="btn btn-primary">Post Comment</button>
                            <small class="text-muted">Posting as <span id="authorName">Anonymous</span></small>
                        </div>
                    </div>
                </div>
            </div>
            <div id="commentsList"></div>
        </div>

        <footer class="mt-5 mb-3">
            <div class="text-center">
                <p>Â© 2024 McKnight's Football Rankings</p>
            </div>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/static-football-rankings/docs/js/main.js"></script>
</body>
</html>
