<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top High School Football Programs of All-Time (50+ seasons)</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>
    <!-- Top Banner Image -->
    <div class="header-banner">
        <img src="webv2/images/football-field-top.jpg" 
             alt="Football Field Header" 
             class="w-100" />
    </div>

    <!-- Team Header -->
    <div class="team-header" id="teamHeader">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-3">
                    <img src="" alt="Team Logo" class="img-fluid team-logo" style="max-height: 100px;" />
                </div>
                <div class="col-md-6 text-center">
                    <h2 class="team-name">Team Name</h2>
                    <p class="team-mascot">Team Mascot</p>
                </div>
                <div class="col-md-3 text-right">
                    <img src="" alt="School Logo" class="img-fluid school-logo" style="max-height: 100px;" />
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container mt-4">
        <h1>Top High School Football Programs of All-Time (50+ seasons)</h1>
        
        <div class="form-group mb-4">
            <input type="text" class="form-control" id="searchInput" placeholder="Search programs..." />
        </div>

        <!-- Add this before the table-responsive div -->
<div class="d-flex justify-content-end mb-3">
    <small class="text-muted">
        Updated on 
        <span id="lastUpdated">
            <!-- Will be populated by JavaScript -->
        </span>
    </small>
</div>

<div class="table-responsive">
    <!-- existing table content -->
</div>

        <!-- Table Content -->
        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Program</th>
                        <th>Combined</th>
                        <th>Margin</th>
                        <th>Win-Loss</th>
                        <th>Offense</th>
                        <th>Defense</th>
                        <th>State</th>
                        <th>Seasons</th>
                        <th>Details</th>
                    </tr>
                </thead>
                <tbody id="programsTableBody">
                    <!-- Data will be populated by JavaScript -->
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <nav>
            <ul class="pagination justify-content-center" id="pagination">
                <!-- Will be populated by JavaScript -->
            </ul>
        </nav>
    </div>


    <!-- Copyright and Footer -->
    <div class="container mt-5">
        <div class="text-center mb-3">
            <p>© 2024 McKnight's Football Rankings</p>
        </div>
    </div>

  <!-- Add this just before the footer banner -->
<!-- Replace the current comments section with this updated version -->
<div class="container mt-5">
    <div class="comments-section">
        <h3>Comments</h3>
        <div class="comment-form mb-4">
            <textarea id="commentText" class="form-control mb-2" rows="3" placeholder="Leave a comment..."></textarea>
            <!-- Add this line for email input -->
            <input type="email" id="commentEmail" class="form-control mb-2" placeholder="Your email address" />
            <button id="submitComment" class="btn btn-primary">Post Comment</button>
        </div>
        <div id="commentsList" class="comments-list">
            <!-- Comments will be loaded here -->
        </div>
    </div>
</div>

<!-- Bottom Banner Image -->
<div class="footer-banner">
    <img src="webv2/images/football-field-top.jpg" 
         alt="Football Field Footer" 
         class="w-100" />
</div>
         
    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Configuration -->
    <script src="js/config.js"></script>
    
    <!-- Custom JavaScript -->
    <script src="js/main.js"></script>

</body>
</html>
