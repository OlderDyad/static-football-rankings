<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Test Page</title>
</head>
<body>
    <h1>Test Comments API</h1>
    <button onclick="testGetComments()">Test GET Comments</button>
    <button onclick="testPostComments()">Test POST Comments</button>
    <button onclick="testVerifyEmail()">Test Verify Email</button>

    <script>
        async function testGetComments() {
            try {
                const response = await fetch("https://static-football-rankings.vercel.app/api/comments", {
                    method: "GET",
                    headers: {
                        "Content-Type": "application/json"
                    }
                });
                const data = await response.json();
                console.log("GET Comments Response:", data);
            } catch (error) {
                console.error("Error with GET Comments:", error);
            }
        }

        async function testPostComments() {
            try {
                const response = await fetch("https://static-football-rankings.vercel.app/api/comments", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ message: "Test comment post" })
                });
                const data = await response.json();
                console.log("POST Comments Response:", data);
            } catch (error) {
                console.error("Error with POST Comments:", error);
            }
        }

        async function testVerifyEmail() {
            try {
                const response = await fetch("https://static-football-rankings.vercel.app/api/verify-email", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ email: "test@example.com" })
                });
                const data = await response.json();
                console.log("POST Verify Email Response:", data);
            } catch (error) {
                console.error("Error with Verify Email:", error);
            }
        }
    </script>
</body>
</html>
